<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gridlock Urban Apparel</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="container nav-container">
      <div class="logo">GRIDLOCK</div>
      <nav class="nav-links">
        <a href="index.html" class="text-accent">Home</a>
        <a href="shop.html">Shop</a>
        <a href="contact.html">Contact</a>
        <a href="cart.html" class="cart-icon">
          Cart
          <span id="cart-count" style="display: none;">0</span>
        </a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="hero-bg"></div>
      <div class="hero-overlay"></div>
      <div class="container" style="position: relative; z-index: 1;">
        <h1>Engineered for the Concrete Jungle.</h1>
        <p>Premium, durable streetwear built to handle the city commute.</p>
        <a href="shop.html" class="btn">Shop the Latest Drop</a>
      </div>
    </section>

    <section class="container">
      <h2 class="section-title">Shop by Category</h2>
      <div class="grid-3">
        <a href="shop.html" class="category-card glass-panel">
          <img src="https://images.unsplash.com/photo-1551028719-00167b16eac5?q=80&w=1000&auto=format&fit=crop" alt="Outerwear">
          <div class="overlay"></div>
          <h3>Outerwear</h3>
        </a>
        <a href="shop.html" class="category-card glass-panel">
          <img src="https://images.unsplash.com/photo-1541099649105-f69ad21f3246?q=80&w=1000&auto=format&fit=crop" alt="Denim & Pants">
          <div class="overlay"></div>
          <h3>Denim & Pants</h3>
        </a>
        <a href="shop.html" class="category-card glass-panel">
          <img src="https://images.unsplash.com/photo-1523206489230-c012c64b2b48?q=80&w=1000&auto=format&fit=crop" alt="Accessories">
          <div class="overlay"></div>
          <h3>Accessories</h3>
        </a>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <div class="footer-content">
        <div class="logo" style="font-size: 1.2rem;">GRIDLOCK</div>
        <div class="social-links">
          <a href="#">IG</a>
          <a href="#">TW</a>
          <a href="#">FB</a>
        </div>
      </div>
      <p class="copyright">&copy; 2026 Gridlock Urban Apparel. All rights reserved.</p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
